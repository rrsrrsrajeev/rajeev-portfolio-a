<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9E1B" />
      <stop offset="100%" stop-color="#EF7D00" />
    </radialGradient>
  </defs>
  
  <!-- Outer Rounded Square Base -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="#1D1D1B" />
  
  <!-- Outer Gold/Orange Ring -->
  <rect x="15" y="15" width="170" height="170" rx="35" fill="none" stroke="url(#goldGrad)" stroke-width="6" />

  <!-- Inner Crest/Shield -->
  <path d="M 100,45 
           L 145,55 
           C 145,95 130,125 100,145 
           C 70,125 55,95 55,55 
           Z" 
        fill="#E4002B" />

  <!-- Graduation Cap Icon inside Shield -->
  <path d="M 100,60 
           L 125,72 100,84 75,72 
           Z" 
        fill="#FFFFFF" />
  <path d="M 85,77 
           L 85,95 
           C 85,102 115,102 115,95 
           L 115,77" 
        fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
  <path d="M 125,72 
           L 128,92 
           C 128,94 126,94 126,92 
           Z" 
        fill="#FF9E1B" stroke="#FF9E1B" stroke-width="1.5" />
  
  <!-- University Initials Text -->
  <text x="100" y="172" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="28" 
        font-weight="900" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        letter-spacing="1">LPU</text>
</svg>
